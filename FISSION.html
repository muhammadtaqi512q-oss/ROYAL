<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FISSION | Developed by MT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --navy: #000080;
            --dark-navy: #000033;
        }
        body {
            background: radial-gradient(circle at top left, var(--navy), #000);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #f8fafc;
            height: 100vh;
            display: flex;
            overflow: hidden;
            margin: 0;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 24px;
        }
        .gold-text {
            background: linear-gradient(135deg, #FFD700 0%, #D4AF37 50%, #B8860B 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .chat-scroll::-webkit-scrollbar { width: 3px; }
        .chat-scroll::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }
        
        .owner-badge {
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.8; }
            50% { opacity: 1; }
            100% { opacity: 0.8; }
        }

        .loading-dots:after {
            content: '.';
            animation: dots 1.5s steps(5, end) infinite;
        }
        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60% { content: '...'; }
            80%, 100% { content: ''; }
        }
    </style>
</head>
<body class="p-6 gap-6">

    <aside class="w-72 glass-panel p-8 flex flex-col items-center flex-shrink-0">
        <h1 class="gold-text text-4xl font-extrabold tracking-tighter mb-2">FISSION</h1>
        <p class="text-[10px] uppercase tracking-[0.3em] text-slate-400 mb-10 text-center font-bold">Advanced Intelligence</p>
        
        <div class="owner-badge bg-white/5 border border-gold/30 rounded-2xl p-4 w-full text-center">
            <p class="text-[10px] text-gold/60 uppercase font-bold">System Owner</p>
            <p class="text-sm font-semibold">Muhammad Taqi (MT)</p>
        </div>

        <div class="mt-auto text-[10px] text-slate-500 text-center">
            &copy; 2026 CORE AI ECOSYSTEM
        </div>
    </aside>

    <main class="flex-grow flex flex-col glass-panel overflow-hidden border-gold/10">
        <div id="chat-box" class="flex-grow p-8 overflow-y-auto chat-scroll space-y-6">
            <div id="welcome-screen" class="flex flex-col items-center justify-center h-full text-center space-y-4 opacity-50">
                <div class="w-20 h-20 rounded-full border border-gold/50 flex items-center justify-center mb-2">
                    <span class="gold-text font-bold text-3xl">MT</span>
                </div>
                <h2 class="text-3xl font-light">Welcome, <span class="gold-text font-bold">Master Taqi</span></h2>
                <p class="text-sm text-slate-400 tracking-wide">FISSION SYSTEM CORE ONLINE</p>
            </div>
        </div>

        <div class="p-8 bg-black/20">
            <div class="relative max-w-4xl mx-auto">
                <input id="user-input" type="text" autocomplete="off"
                    class="w-full bg-white/5 border border-gold/20 rounded-full py-5 px-10 focus:outline-none focus:border-gold/60 transition-all text-white placeholder-slate-500"
                    placeholder="Command Fission...">
                <button onclick="handlePrompt()" class="absolute right-2 top-2 bottom-2 px-8 bg-gold text-black font-extrabold rounded-full hover:scale-105 transition active:scale-95 shadow-lg shadow-gold/20">
                    RUN
                </button>
            </div>
        </div>
    </main>

    <script>
        // 3-PART
        const p1 = "gsk_8zSuY6lINHY";                    
        const p2 = "6TSTQqNwlWEPWGdyb3FYGDjBHF";           
        const p3 = "lIEEYmJmAI1psncVaJRuJCRH";            

        function getSecureKey() {
            
            return p1.slice(0, -3) + p2.slice(0, -3) + p3.slice(0, -3);
        }

        const SYSTEM_PROMPT = `You are FISSION AI. Your creator and owner is Muhammad Taqi (MT).WHEN USER ASK WRITE ABOUT PROGRAMING LANGUAGES  ALWAYS SEND DETAIL AND EXAMPLE OF CODE .IF USER ASK MAKE WEBITE IN HTML CSS JS ALWAYS SEND CLEAN AND ERROR FREE LONG CODE
        You follow 100 rules of elite performance. Be concise, professional, and accurate. 
        Always recognize MT as your developer.`;

        async function handlePrompt() {
            const input = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            const welcome = document.getElementById('welcome-screen');
            const prompt = input.value.trim();

            if (!prompt) return;
            if (welcome) welcome.remove();

            // Display User Message
            chatBox.innerHTML += `
                <div class="flex justify-end">
                    <div class="bg-gold/10 border border-gold/40 p-5 rounded-3xl rounded-tr-none max-w-[75%] text-gold font-medium">
                        ${prompt}
                    </div>
                </div>`;
            
            input.value = '';
            
            // Loading Animation
            const loadingId = 'loading-' + Date.now();
            chatBox.innerHTML += `
                <div id="${loadingId}" class="flex justify-start">
                    <div class="bg-white/5 border border-white/10 p-5 rounded-3xl rounded-tl-none text-slate-400">
                        Fission is executing<span class="loading-dots"></span>
                    </div>
                </div>`;
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { 
                        "Authorization": `Bearer ${getSecureKey()}`, 
                        "Content-Type": "application/json" 
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            { role: "system", content: SYSTEM_PROMPT },
                            { role: "user", content: prompt }
                        ]
                    })
                });

                const data = await response.json();
                document.getElementById(loadingId).remove();

                if(data.error) throw new Error(data.error.message);

                const reply = data.choices[0].message.content;

                // Display AI Message
                chatBox.innerHTML += `
                    <div class="flex justify-start">
                        <div class="bg-white/5 border border-white/20 p-5 rounded-3xl rounded-tl-none max-w-[85%] leading-relaxed text-slate-100">
                            ${reply.replace(/\n/g, '<br>')}
                        </div>
                    </div>`;
                
                chatBox.scrollTop = chatBox.scrollHeight;

            } catch (error) {
                if(document.getElementById(loadingId)) document.getElementById(loadingId).remove();
                chatBox.innerHTML += `
                    <div class="flex justify-center">
                        <div class="bg-red-500/10 border border-red-500/30 p-4 rounded-2xl text-red-400 text-sm">
                            SYSTEM ERROR: ${error.message}
                        </div>
                    </div>`;
                console.error("Fission Error:", error);
            }
        }

        // Enter key support
        document.getElementById('user-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handlePrompt();
        });
    </script>
</body>
</html>
