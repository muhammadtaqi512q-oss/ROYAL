<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FUSSIN AI Modern Chat</title>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');

  :root {
    --primary: #4f46e5; /* Indigo-600 */
    --secondary: #14b8a6; /* Teal-500 */
    --background: #0f172a; /* Dark blue */
    --text-light: #cbd5e1; /* Gray-300 */
    --text-dark: #e0e7ff; /* Light Indigo */
    --font-family: 'Poppins', sans-serif;
    --border-radius: 16px;
    --shadow-light: rgba(79, 70, 229, 0.4);
    --shadow-dark: rgba(0, 0, 0, 0.2);
  }

  /* Snowfall background */
  body {
    margin: 0;
    height: 100vh;
    font-family: var(--font-family);
    background: var(--background);
    color: var(--text-dark);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Snowflake styles and animation */
  .snowflake {
    position: fixed;
    top: -10px;
    width: 10px;
    height: 10px;
    background: white;
    border-radius: 50%;
    opacity: 0.8;
    pointer-events: none;
    animation-name: fall, sway;
    animation-timing-function: linear, ease-in-out;
    animation-iteration-count: infinite, infinite;
  }

  @keyframes fall {
    0% {
      transform: translateY(-10px);
      opacity: 0.8;
    }
    90% {
      opacity: 0.8;
    }
    100% {
      transform: translateY(100vh);
      opacity: 0;
    }
  }
  @keyframes sway {
    0%, 100% {
      transform: translateX(0);
    }
    50% {
      transform: translateX(15px);
    }
  }

  /* Header */
  header {
    background: linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%);
    color: white;
    padding: 1.5rem 2.5rem;
    text-align: center;
    font-weight: 700;
    font-size: 1.9rem;
    letter-spacing: 0.08em;
    box-shadow: 0 8px 30px var(--shadow-light);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    z-index: 10;
  }
  .header-avatar {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background-image: url('https://cdn-icons-png.flaticon.com/512/194/194938.png');
    background-size: cover;
    border: 2.5px solid white;
    flex-shrink: 0;
    box-shadow: 0 0 10px rgba(255 255 255 / 0.6);
  }

  /* Container */
  #container {
    flex: 1;
    max-width: 720px;
    margin: 1.5rem auto 2rem;
    background: rgba(31, 41, 55, 0.85);
    border-radius: var(--border-radius);
    box-shadow: 0 12px 36px var(--shadow-dark);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255 255 255 / 0.1);
    z-index: 5;
  }

  #messages {
    flex-grow: 1;
    padding: 2rem 2.25rem 1rem;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 1.3rem;
    scroll-behavior: smooth;
    color: var(--text-light);
  }

  .message-wrapper {
    display: flex;
    max-width: 70%;
    gap: 1rem;
    align-items: flex-end;
    animation: fadeInUp 0.45s ease forwards;
  }
  @keyframes fadeInUp {
    from {
      opacity: 0;
      transform: translateY(18px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .bot-wrapper {
    flex-direction: row;
    justify-content: flex-start;
  }
  .bot-avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background-image: url('https://cdn-icons-png.flaticon.com/512/194/194938.png');
    background-size: cover;
    box-shadow: 0 0 14px var(--secondary);
  }

  .bot.message {
    background: var(--secondary);
    color: #f0f9f9;
    padding: 1.25rem 1.5rem;
    border-radius: var(--border-radius);
    font-size: 1rem;
    font-weight: 500;
    line-height: 1.5;
    box-shadow: 0 6px 20px var(--shadow-dark);
    user-select: text;
  }

  .user-wrapper {
    flex-direction: row-reverse;
    justify-content: flex-end;
  }
  .user.message {
    background: var(--primary);
    color: #eef2ff;
    padding: 1.25rem 1.5rem;
    border-radius: var(--border-radius);
    font-weight: 600;
    font-size: 1rem;
    box-shadow: 0 6px 20px var(--shadow-dark);
    line-height: 1.5;
    user-select: text;
  }

  #typingIndicator {
    padding-left: 4.25rem;
    font-style: italic;
    font-size: 0.88rem;
    color: var(--text-light);
    display: none;
    user-select: none;
  }

  #inputArea {
    display: flex;
    gap: 1rem;
    padding: 1.2rem 1.8rem;
    border-top: 1px solid rgba(255 255 255 / 0.1);
    background: rgba(255 255 255 / 0.05);
    backdrop-filter: blur(10px);
  }
  textarea {
    flex-grow: 1;
    font-size: 1rem;
    padding: 1rem 1.4rem;
    border-radius: var(--border-radius);
    border: 2px solid transparent;
    resize: none;
    height: 80px;
    font-family: var(--font-family);
    color: var(--text-light);
    background: rgba(0 0 0 / 0.2);
    transition: border-color 0.3s ease, background-color 0.3s ease;
  }
  textarea::placeholder {
    color: var(--text-light);
    opacity: 0.7;
  }
  textarea:focus {
    outline: none;
    border-color: var(--primary);
    background: rgba(0 0 0 / 0.3);
    box-shadow: 0 0 12px var(--primary);
  }
  button {
    background: var(--primary);
    color: white;
    border: none;
    padding: 0 2.25rem;
    font-weight: 700;
    font-size: 1.1rem;
    border-radius: var(--border-radius);
    cursor: pointer;
    transition: background-color 0.3s ease;
    box-shadow: 0 6px 18px var(--shadow-light);
  }
  button:hover:not(:disabled) {
    background-color: #4338ca;
  }
  button:disabled {
    background-color: #7c83f2;
    cursor: not-allowed;
    box-shadow: none;
  }

  /* Scrollbar */
  #messages::-webkit-scrollbar {
    width: 8px;
  }
  #messages::-webkit-scrollbar-thumb {
    background: var(--primary);
    border-radius: 4px;
  }
  #messages::-webkit-scrollbar-track {
    background: transparent;
  }

  /* Responsive */
  @media (max-width: 480px) {
    #container {
      margin: 1rem 1rem 1.5rem;
      height: 85vh;
    }
    header {
      font-size: 1.3rem;
      padding: 1rem 1.25rem;
      gap: 0.5rem;
    }
    .bot.message,
    .user.message {
      font-size: 0.95rem;
      max-width: 100%;
    }
  }
</style>
</head>
<body>

<header>
  <div class="header-avatar" aria-hidden="true"></div>
  ROYAL - Owned by Muhammad Taqi
</header>

<div id="container" role="main" aria-live="polite" aria-relevant="additions">
  <div id="messages" role="log" aria-live="polite" aria-atomic="false">
    <div class="message-wrapper bot-wrapper">
      <div class="bot-avatar"></div>
      <div class="bot message" tabindex="0">Hello! I am ROYAL AI. Ask me anything about coding and programming.</div>
    </div>
  </div>
  <div id="typingIndicator" class="typing" aria-live="assertive" aria-atomic="true">Fussin AI is thinking...</div>
  <form id="inputArea" autocomplete="off" aria-label="Chat input form">
    <textarea id="input" placeholder="Type your question here..." rows="2" aria-label="Chat input"></textarea>
    <button id="sendBtn" type="submit" aria-label="Send message">Send</button>
  </form>
</div>

<script>
  // Create snowflakes for animated background
  function createSnowflakes(count = 40) {
    for(let i=0; i < count; i++){
      const snowflake = document.createElement('div');
      snowflake.classList.add('snowflake');
      snowflake.style.left = Math.random() * 100 + 'vw';
      snowflake.style.animationDuration = (5 + Math.random() * 10) + 's, ' + (3 + Math.random() * 5) + 's';
      snowflake.style.animationDelay = (Math.random() * 15) + 's, ' + (Math.random() * 5) + 's';
      snowflake.style.opacity = 0.3 + Math.random() * 0.7;
      snowflake.style.width = snowflake.style.height = (6 + Math.random() * 8) + 'px';
      document.body.appendChild(snowflake);
    }
  }
  createSnowflakes();

  const chat = document.getElementById('messages');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  const typingIndicator = document.getElementById('typingIndicator');

  let apiPart1 = 'sk-or-v1-';
  let apiPart2 = '10d4f24ee5a8e3cc007acaa5376e30243882abd20fbbc';
  let apiPart3 = '77d17ba2c28c44e2b67';
  let API_KEY = apiPart1 + apiPart2 + apiPart3;

  const API_URL = 'https://openrouter.ai/api/v1/chat/completions';

  let userApiPart1 = null;
  let userApiPart2 = null;
  let userApiPart3 = null;

  function tryCombineUserApiKey() {
    if (userApiPart1 !== null && userApiPart2 !== null && userApiPart3 !== null) {
      API_KEY = userApiPart1 + userApiPart2 + userApiPart3;
      addMessage("API key updated successfully.", 'bot');
      userApiPart1 = userApiPart2 = userApiPart3 = null;
      return true;
    }
    return false;
  }

  function checkApiKeyParts(text) {
    text = text.toLowerCase();
    if (text.includes('mean 1')) {
      userApiPart1 = 'sk-or-v1-';
      return true;
    }
    if (text.includes('mean 2')) {
      userApiPart2 = 'e9cb5d106e3af40f4eead23908bd67e108cfb363cd8d820';
      return true;
    }
    if (text.includes('mean 3')) {
      userApiPart3 = 'b697170d48f1645b2';
      return true;
    }
    return false;
  }

  document.getElementById('inputArea').addEventListener('submit', async e => {
    e.preventDefault();
    const text = input.value.trim();
    if (!text) return;

    if (checkApiKeyParts(text)) {
      input.value = '';
      sendBtn.disabled = false;
      typingIndicator.style.display = 'none';
      if (tryCombineUserApiKey()) {
        return;
      } else {
        addMessage("Received partial API key part. Please send remaining parts.", 'bot');
        return;
      }
    }

    addMessage(text, 'user');
    input.value = '';
    sendBtn.disabled = true;
    typingIndicator.style.display = 'block';

    if (/owner|creator/i.test(text)) {
      handleBotReply("Muhammad Taqi is my owner and creator.");
      return;
    }

    try {
      const response = await fetch(API_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${API_KEY}`
        },
        body: JSON.stringify({
          model: 'arcee-ai/trinity-large-preview:free',
          messages: [{ role: 'user', content: text }]
        })
      });

      const data = await response.json();

      if (data.choices && data.choices[0].message.content) {
        handleBotReply(data.choices[0].message.content);
      } else if(data.error) {
        handleBotReply("API error: " + (data.error.message || JSON.stringify(data.error)));
      } else {
        handleBotReply("Sorry, I got an unexpected response format.");
      }
    } catch(err) {
      handleBotReply("Sorry, I encountered an error: " + err.message);
    }
  });

  function handleBotReply(text) {
    typingIndicator.style.display = 'none';
    addMessage(text, 'bot');
    speakText(text);
    sendBtn.disabled = false;
  }

  function addMessage(text, sender) {
    const wrapper = document.createElement('div');
    wrapper.className = `message-wrapper ${sender}-wrapper`;
    let avatarHTML = '';
    if(sender === 'bot') {
      avatarHTML = `<div class="bot-avatar" aria-hidden="true"></div>`;
    }
    const safeText = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    wrapper.innerHTML = `
      ${avatarHTML}
      <div class="${sender} message" tabindex="0">${safeText}</div>
    `;
    chat.appendChild(wrapper);
    chat.scrollTop = chat.scrollHeight;
  }

  function speakText(text) {
    if (!('speechSynthesis' in window)) return;
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'en-US';
    let voices = speechSynthesis.getVoices();
    const setVoice = () => {
      voices = speechSynthesis.getVoices();
      // Prefer a male voice if possible
      const maleVoice = voices.find(v => 
        v.name.toLowerCase().includes('david') || 
        v.name.toLowerCase().includes('male') || 
        v.name.toLowerCase().includes('boy'));
      if (maleVoice) {
        utterance.voice = maleVoice;
      } else {
        utterance.voice = voices[0];
      }
      speechSynthesis.speak(utterance);
    };
    if (!voices.length) {
      speechSynthesis.onvoiceschanged = setVoice;
    } else {
      setVoice();
    }
  }
</script>

</body>
</html>
